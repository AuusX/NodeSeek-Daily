name: NodeSeek 自动签到评论加鸡腿

on:
  push:
    branches:
      - main
  schedule:
    - cron: '00 16 * * *'  # UTC 16:00，即北京时间 00:00
  workflow_dispatch:      # <--- 添加这一行，注意缩进与上面的 schedule 对齐
jobs:
  run-nodeseek-daily:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4  # 推荐升级到 v4

      - name: Set up Python
        uses: actions/setup-python@v5  # 推荐升级到 v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          # 确保 undetected-chromedriver 是最新版以匹配系统 Chrome
          pip install --upgrade undetected-chromedriver selenium

      - name: Run NodeSeek script
        env:
          NS_COOKIE: ${{ secrets.NS_COOKIE }}
          NS_RANDOM: ${{ secrets.NS_RANDOM }}
          HEADLESS: "true"
        run: |
          # GitHub Actions 预装了 google-chrome，直接运行脚本即可
          python nodeseek_daily.py
