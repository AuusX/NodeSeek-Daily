name: NodeSeek 多账号自动化

on:
  push:
    branches:
      - main
  schedule:
    - cron: '00 16 * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  run-nodeseek:
    runs-on: ubuntu-latest
    strategy:
      # 即使其中一个账号报错，也不影响其他账号运行
      fail-fast: false 
      matrix:
        # 在这里定义你的账号编号，有几个账号就写几个
        account_id: [1, 2] 

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install --upgrade undetected-chromedriver selenium

      - name: Run NodeSeek script
        env:
          # 动态读取对应的 Secret，例如 NS_COOKIE_1, NS_COOKIE_2
          NS_COOKIE: ${{ secrets[format('NS_COOKIE_{0}', matrix.account_id)] }}
          NS_RANDOM: "true"
          HEADLESS: "true"
        run: |
          echo "正在为账号 ${{ matrix.account_id }} 执行任务..."
          python nodeseek_daily.py
